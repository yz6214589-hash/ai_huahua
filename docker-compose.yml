services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: devroot
      MYSQL_DATABASE: huahua_trade
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: ./docker/backend.Dockerfile
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev
      MYSQL_DB: huahua_trade
      AI_QUANT_REPORT_USE_LLM: "0"
      AI_QUANT_CHARLES_JOB_STORE_DIR: /app/.ai_quant/job_runs
    ports:
      - "8000:8000"
    volumes:
      - ./.ai_quant:/app/.ai_quant
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: ./docker/web.Dockerfile
    environment:
      VITE_DEV_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

  streamlit:
    build:
      context: .
      dockerfile: ./docker/streamlit.Dockerfile
    environment:
      AI_QUANT_API_BASE: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  mysql_data:
