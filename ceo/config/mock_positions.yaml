#
# 当前剧本: 假设 2026-04-01 用 100 万资金, 5 只票各分配 ~19 万,
# 按当日开盘价买入 (整手 100 股), 剩余约 12.7 万现金留作加仓 / 抄底
# cost = 2026-04-01 开盘价 (从 MySQL trade_stock_daily 取)

# 总资金 (元)
