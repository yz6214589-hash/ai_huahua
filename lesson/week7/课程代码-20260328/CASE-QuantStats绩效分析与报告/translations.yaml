  Calmar Ratio: 卡玛比率
  Omega Ratio: 欧米伽比率
  "Gain/Pain Ratio": 盈亏比率
  "Gain/Pain (1M)": 盈亏比(近1月)
  Information Ratio: 信息比率
  Payoff Ratio: 赔付比率
  Profit Factor: 利润因子
  Profit Ratio: 利润比率
