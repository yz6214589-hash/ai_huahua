# QuantStats HTML 报告 英文->中文 翻译配置
# 修改此文件即可自定义报告中的中文翻译
# 注意: 长字符串在前, 短字符串在后, 避免替换冲突
# 例如 "Cumulative Return" 必须在 "Return" 之前

# === 报告标题 ===
报告标题:
  Strategy Visualization: 策略可视化分析
  Performance Metrics: 绩效指标

# === 主要绩效指标 ===
绩效指标:
  Cumulative Return: 累计收益
  "CAGR%%": "年化收益(CAGR)%%"
  "CAGR%": "年化收益(CAGR)%"
  Max Drawdown: 最大回撤
  Sharpe Ratio: 夏普比率
  Smart Sharpe: 智能夏普
  Sortino Ratio: 索提诺比率
